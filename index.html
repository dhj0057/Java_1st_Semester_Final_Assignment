<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe Kiosk — Live Demo</title>
  <script src="https://cjrtnc.leaningtech.com/3.0/cj3loader.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #fff;
    }
    h1 { font-size: 13px; letter-spacing: 0.2em; color: #555; margin-bottom: 20px; }
    #loading { color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <h1>CAFE KIOSK ORDER SYSTEM — LIVE DEMO</h1>
  <div id="loading">Loading Java runtime...</div>
  <script type="module">
    await cheerpjInit({ version: 8 });
    document.getElementById('loading').remove();
    const display = cheerpjCreateDisplay(800, 600);
    document.body.appendChild(display);
    await cheerpjRunJar("/app/Java_project01.jar");
  </script>
</body>
</html>
